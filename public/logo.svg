<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1D4ED8" flood-opacity="0.35"/>
    </filter>
    <filter id="cardshadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1E40AF" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 배경 원형 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 장식 원 (배경) -->
  <circle cx="420" cy="100" r="80" fill="#2563EB" opacity="0.4"/>
  <circle cx="90" cy="420" r="60" fill="#1D4ED8" opacity="0.4"/>

  <!-- 카드 뒷장 (살짝 기울어짐) -->
  <g transform="rotate(-8, 256, 256)" filter="url(#cardshadow)">
    <rect x="120" y="155" width="280" height="190" rx="20" fill="#60A5FA" opacity="0.7"/>
  </g>

  <!-- 카드 앞장 -->
  <g filter="url(#cardshadow)">
    <rect x="106" y="148" width="280" height="190" rx="20" fill="url(#card)"/>
  </g>

  <!-- 카드 상단 컬러 바 -->
  <clipPath id="clip">
    <rect x="106" y="148" width="280" height="190" rx="20"/>
  </clipPath>
  <rect x="106" y="148" width="280" height="8" fill="#3B82F6" clip-path="url(#clip)"/>

  <!-- 텍스트 라인들 -->
  <rect x="140" y="192" width="100" height="14" rx="7" fill="#BFDBFE"/>
  <rect x="140" y="216" width="155" height="10" rx="5" fill="#DBEAFE"/>
  <rect x="140" y="234" width="130" height="10" rx="5" fill="#DBEAFE"/>
  <rect x="140" y="252" width="115" height="10" rx="5" fill="#EFF6FF"/>

  <!-- 번개 아이콘 (오른쪽 하단) -->
  <g filter="url(#shadow)">
    <polygon points="302,178 278,222 296,222 272,268 322,212 300,212" fill="url(#bolt)"/>
  </g>

  <!-- 하단 점선 구분선 -->
  <line x1="130" y1="296" x2="366" y2="296" stroke="#BFDBFE" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- 하단 태그들 -->
  <rect x="130" y="308" width="52" height="16" rx="8" fill="#DBEAFE"/>
  <rect x="190" y="308" width="40" height="16" rx="8" fill="#EDE9FE"/>
  <rect x="238" y="308" width="56" height="16" rx="8" fill="#D1FAE5"/>
</svg>
